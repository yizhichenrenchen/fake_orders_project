<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下单</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h4>下单</h4>
    <form action="/orders/create" method="post">


        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupSelect02">发布平台</label>
            <select class="form-select" id="inputGroupSelect02" name="platform">
                <option selected>抖音</option>
                <option value="快手">快手</option>
                <option value="哔哩哔哩">哔哩哔哩</option>
                <option value="今日头条">今日头条</option>
                <option value="西瓜视频">西瓜视频</option>
            </select>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="inputGroup-sizing-default">url地址</span>
            <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default" name="url">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="inputGroup-sizing-default">所需数量</span>
            <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default" name="count">
        </div>


        <button type="submit" class="btn btn-primary">下单</button>
    </form>
</body>
</html>
